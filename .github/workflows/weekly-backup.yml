name: Weekly Full Backup

on:
  schedule:
    # Run every Sunday at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  full-backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run MongoDB backup to R2
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: canvas-chemistry-assets
        run: npx tsx scripts/mongodb-backup.ts --r2
      
      - name: Run R2 assets backup to local
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: canvas-chemistry-assets
        run: npx tsx scripts/r2-backup.ts ./weekly-r2-backup
      
      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-backup-${{ github.run_number }}
          path: ./weekly-r2-backup
          retention-days: 90 # Keep for 3 months
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Weekly full backup completed on $(date)"
          # Add notification logic here
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Weekly backup failed on $(date)"
          # Add notification logic here
